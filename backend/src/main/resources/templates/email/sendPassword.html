<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>COMMIT CAR 임시 비밀번호 발송</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background-color: #f9f9f9;">
<div style="max-width: 500px; font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif; margin: 40px auto; background-color: #ffffff; border: 1px solid #eeeeee;">

    <div style="background-color: #1a1a1a; color: #ffffff; font-size: 14pt; font-weight: 800; letter-spacing: 1px; padding: 20px 25px; border-bottom: 4px solid #e74c3c;">
        COMMIT CAR.
    </div>

    <div style="padding: 30px 25px;">
        <div style="color: #212121; line-height: 1.6; margin-bottom: 25px; text-align: justify; font-size: 11pt;">
            안녕하세요, 커밋카입니다.<br>
            고객님의 계정 보안을 위해 요청하신 <strong style="color: #e74c3c;">임시 비밀번호</strong>를 발송해 드립니다.<br><br>
            로그인 후 마이페이지에서 반드시 <strong style="color: #1a1a1a;">비밀번호를 새로 변경</strong>해 주시기 바랍니다.
        </div>

        <div style="background-color: #f8f9fa; border: 1px dashed #cccccc; border-radius: 8px; padding: 25px 10px; text-align: center; margin-bottom: 25px;">
            <span style="display: block; font-size: 9pt; color: #888888; margin-bottom: 10px; font-weight: 500;">임시 비밀번호</span>
            <code style="color: #1a1a1a; font-family: 'Roboto Mono', monospace; font-size: 20pt; font-weight: 700; letter-spacing: 2px; user-select: all;" th:text="${password}">ABC123DE</code>
        </div>

        <div style="color: #666666; line-height: 1.6; font-size: 10pt; text-align: center; background-color: #fff9f9; padding: 15px; border-radius: 4px; border: 1px solid #ffebeb;">
            보안을 위해 임시 비밀번호로 로그인하신 후,<br>
            최대한 빠른 시일 내에 비밀번호를 수정하시길 권장합니다.
        </div>
    </div>

    <div style="background-color: #f4f4f4; padding: 20px 25px; border-top: 1px solid #eeeeee;">
        <div style="color: #999999; font-size: 8pt; line-height: 1.4;">
            &copy; 2026 COMMIT CAR. All rights reserved.<br>
            본 메일은 발신 전용이며 회신되지 않습니다.
        </div>
    </div>
</div>
</body>
</html>
